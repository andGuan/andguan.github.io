<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>H2O2 Official</title>
    <style>
        /* --- 选中状态样式开始 --- */
        #sideNav li.active {
            background: linear-gradient(
                180deg,
                #800080,
                #600060,
                #400040,
                #600060,
                #800080
            );
            background-size: 100% 300%;
            animation: flowGradient 3s linear infinite;

            /* --- 新增：添加圆角 --- */
            border-radius: 8px; /* 控制圆角大小 */
        }

        #sideNav li.active a {
            color: #fff;
            font-weight: bold;
        }
        /* --- 选中状态样式结束 --- */

        /* --- 定义流动动画 --- */
        @keyframes flowGradient {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 0% 100%;
            }
        }
        /* --- 动画定义结束 --- */

        body {
            margin: 0;
            height: 100vh;
            background: #000000;
            font-family: 'Arial', sans-serif;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* 左侧导航栏样式 */
        #sideNav {
            position: fixed;
            left: 0;
            top: 0;
            width: 180px; /* 如果 active li 加了左右 margin，这里可能要相应加宽 */
            height: 100vh;
            /* background: transparent; */ /* 背景已移除 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding-top: 60px;
            box-sizing: border-box;
            z-index: 10;
            /* 为了给圆角的 active li 留出空间，可以给 ul 加一点左右 padding */
             padding-left: 5px;
             padding-right: 5px;
        }

        /* 平滑过渡伪元素 */
        body::before {
            content: '';
            position: fixed;
            /* left 值需要根据 #sideNav 的宽度调整 */
            left: 180px; /* 如果 #sideNav 加宽了，这里也要跟着移动 */
            top: 0;
            width: 80px;
            height: 100vh;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0));
            z-index: 5;
            pointer-events: none;
        }

        #sideNav ul {
            list-style: none;
            padding: 0; /* ul 的 padding 在 #sideNav 里控制了 */
            margin: 0;
            position: relative;
            z-index: 11;
        }

        /* 默认链接样式 */
        #sideNav li a {
            display: block;
            padding: 15px 20px; /* 内边距保持不变 */
            color: #eee;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
            z-index: 11;
             border-radius: inherit; /* 让链接继承父 li 的圆角，可选 */
        }

        /* 默认悬停效果 (非选中状态) */
        #sideNav li:not(.active) a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
             /* 如果希望 hover 效果也有圆角 */
             border-radius: 8px; /* 与 active 状态一致 */
        }

        /* 内容容器样式调整 */
        .content-container {
            text-align: center;
            position: absolute;
            top: 50%;
            /* left 计算需要根据 #sideNav 最终宽度调整 */
            left: calc(50% + 90px); /* (假设 #sideNav 宽度仍为 180px / 2 = 90px 偏移) */
            transform: translate(-50%, -50%);
            width: calc(100% - 180px); /* 同样基于 #sideNav 宽度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* 标题样式 */
        h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #800080, #660066, #4d004d, #330033, #1a001a, #000000, #1a001a, #330033, #4d004d, #660066, #800080);
            background-size: 600% 600%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: gradientText 10s ease infinite;
            margin-bottom: 20px;
        }

        /* 标题动画 */
        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* AdSense 脚本 */
         <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6819146460122118"
             crossorigin="anonymous"></script>

    </style>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6819146460122118"
     crossorigin="anonymous"></script>
</head>
<body>

    <nav id="sideNav">
        <ul>
            <li class="active"><a href="#">主页</a></li>
            <li><a href="#">订阅地址</a></li>
            <li><a href="#">技术支持</a></li>
        </ul>
    </nav>

    <div class="content-container">
        <h1>Hello H2O2</h1>
    </div>

    <script>
        // JavaScript 保持不变
        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelectorAll('#sideNav li a');
            const navListItems = document.querySelectorAll('#sideNav li');

            navLinks.forEach(link => {
                link.addEventListener('click', function(event) {
                    event.preventDefault();

                    navListItems.forEach(item => {
                        item.classList.remove('active');
                    });

                    this.closest('li').classList.add('active');
                });
            });
        });
    </script>

</body>
</html>
